<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>See You Soon, Adri!</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#f8cdda,#1d2b64);
    color:white;
    text-align:center;
    padding-bottom:50px;
    overflow-x:hidden;
}

h1{
    margin-top:40px;
    font-size:36px;
}

#countdown{
    font-size:26px;
    font-weight:bold;
    margin:20px 0;
}

/* COLLEGE */

.collage{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:15px;
    padding:20px;
    max-width:400px;
    margin:auto;
}

.photo-card{
    background:rgba(255,255,255,0.1);
    border-radius:15px;
    padding:10px;
    backdrop-filter: blur(5px);
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    cursor:pointer;
    transition:0.3s;
}

.photo-card:hover{
    transform:scale(1.05);
}

.photo-card img{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:12px;
}

.caption{
    margin-top:8px;
    font-size:14px;
    font-weight:bold;
}

/* POPUP */

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    align-items:center;
    justify-content:center;
}

.popup img{
    max-width:90%;
    max-height:80%;
    border-radius:15px;
}

/* HEART ANIMATION */

.heart{
    position:fixed;
    font-size:20px;
    animation: floatUp 1.5s linear forwards;
    pointer-events:none;
}

@keyframes floatUp{
    0%{opacity:1; transform:translateY(0) scale(1);}
    100%{opacity:0; transform:translateY(-100px) scale(2);}
}

footer{
    margin-top:30px;
    opacity:0.8;
    font-size:14px;
}
</style>
</head>
<body>

<h1>See You Soon 💕</h1>

<div id="countdown">Loading...</div>

<div class="collage">

    <div class="photo-card" onclick="openPopup(this)">
        <img src="images/foto1.jpg">
        <div class="caption">First date to the Aquarium! 😃 </div>
    </div>

    <div class="photo-card" onclick="openPopup(this)">
        <img src="images/foto2.jpg">
        <div class="caption">Where's the goat? 🐏 </div>
    </div>

    <div class="photo-card" onclick="openPopup(this)">
        <img src="images/foto3.jpg">
        <div class="caption">Our first ever museum date! 🖼️🎨 </div>
    </div>

    <div class="photo-card" onclick="openPopup(this)">
        <img src="images/foto4.jpg">
        <div class="caption">Yuk yuk yukkk naik motor lagiii</div>
    </div>

</div>

<div class="popup" id="popup" onclick="closePopup()">
    <img id="popupImg">
</div>

<footer>
Can't wait to see you, Adri ✨
</footer>

<script>

/* ===== COUNTDOWN ===== */

const meetDate = new Date("March 20, 2026").getTime();

function updateCountdown(){
    const now = new Date().getTime();
    const distance = meetDate - now;

    const days = Math.ceil(distance / (1000 * 60 * 60 * 24));
    const countdownEl = document.getElementById("countdown");

    if(days > 0){
        countdownEl.innerHTML = `${days} Days Left 💕`;
    } 
    else if(days === 0){
        countdownEl.innerHTML = "✨ Today We Meet ✨";
    } 
    else {
        countdownEl.innerHTML = "💖 We Already Met!";
    }
}

updateCountdown();
setInterval(updateCountdown, 1000 * 60 * 60);

/* ===== POPUP ===== */

function openPopup(card){
    const imgSrc = card.querySelector("img").src;
    document.getElementById("popupImg").src = imgSrc;
    document.getElementById("popup").style.display = "flex";
    createHeart(event);
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

/* ===== HEART EFFECT ===== */

function createHeart(e){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";
    document.body.appendChild(heart);

    setTimeout(()=> heart.remove(),1500);
}

/* ===== SPARKLE EFFECT ===== */

setInterval(()=>{
    const sparkle = document.createElement("div");
    sparkle.innerHTML = "✨";
    sparkle.style.position = "fixed";
    sparkle.style.left = Math.random()*100 + "vw";
    sparkle.style.top = Math.random()*100 + "vh";
    sparkle.style.opacity = "0.6";
    sparkle.style.fontSize = "12px";
    sparkle.style.pointerEvents = "none";
    document.body.appendChild(sparkle);

    setTimeout(()=> sparkle.remove(),1000);
},800);

</script>

</body>
</html>
